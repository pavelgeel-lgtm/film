name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        env:
          SSH_KEY_B64: ${{ secrets.VPS_KEY }}
        run: |
          echo "$SSH_KEY_B64" | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            xxxmedia3@213.165.218.55 \
            "cd /opt/3xmedia && sudo git pull origin main && sudo docker compose build --no-cache nginx && sudo docker compose up -d --remove-orphans && sudo docker image prune -f && echo '✅ Deploy complete'"
          rm /tmp/deploy_key
