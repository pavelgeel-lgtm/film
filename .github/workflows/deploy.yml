name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        run: |
          echo "${{ secrets.VPS_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "cd /opt/3xmedia && sudo git pull origin main && sudo docker compose build nginx && sudo docker compose up -d --remove-orphans && sudo docker image prune -f && echo '✅ Deploy complete'"
          rm /tmp/deploy_key
