# ── HTTP → HTTPS redirect + certbot ───────────────────────────────────────
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name 213.165.218.55.nip.io;

    ssl_certificate     /etc/letsencrypt/live/213.165.218.55.nip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/213.165.218.55.nip.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2|webp|png|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* (sw\.js|manifest\.json)$ {
        expires off;
        add_header Cache-Control "no-store, no-cache";
    }

    location /api/ {
        proxy_pass         http://server:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
        client_max_body_size 55m;
    }
}
